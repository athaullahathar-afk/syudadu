<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Meetup</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="floating-shapes">
                    <div class="shape shape1"></div>
                    <div class="shape shape2"></div>
                    <div class="shape shape3"></div>
                </div>
                <h1 class="title">Hey there ✨</h1>
                <p class="subtitle">I've been wanting to talk to you about something important.</p>
            </div>

            <div class="content">
                <p class="message">Are you free for a quick Google Meet? Just you and me. Pick a date that works for you:</p>
                
                <div class="date-grid" id="dateGrid">
                    <!-- Dates will be populated by JS -->
                </div>

                <div class="footer">
                    <p class="hint">* Tap a date to confirm</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
